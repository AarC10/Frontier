# Disable real SPI hardware but keep LoRa enabled via sim
CONFIG_SPI=n
CONFIG_LORA=y
CONFIG_LORA_SIM=y

# Console on native stdin/stdout
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_NATIVE_UART_0_ON_STDINOUT=y

# NVS on emulated flash
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# GPIO for LED stub
CONFIG_GPIO=y
