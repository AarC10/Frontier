CONFIG_LORA=y
CONFIG_LOG=y
CONFIG_CBPRINTF_FP_SUPPORT=y

CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_SERIAL=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_MODE_DEFERRED=n
#CONFIG_LORA_LOG_LEVEL_DBG=y
CONFIG_LORA_LOG_LEVEL_ERR=y
CONFIG_CPP=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_STD_CPP23=y

CONFIG_MAIN_STACK_SIZE=2048

# Need more memory :(
CONFIG_SHELL=y
CONFIG_SHELL_LOG_BACKEND=n

CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

CONFIG_WATCHDOG=y
CONFIG_HWINFO=y


# Core
CONFIG_CORE=y
CONFIG_CORE_GNSS=y
CONFIG_CORE_SETTINGS=y
CONFIG_CORE_LORA=y
CONFIG_CORE_TDMA_TIME=y
#CONFIG_LORA_LOG_LEVEL_DBG=y

# Core Settings
CONFIG_SHELL_FREQUENCY=y
