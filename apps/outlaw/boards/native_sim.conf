# Disable real SPI hardware but keep LoRa enabled via sim driver
CONFIG_SPI=n
CONFIG_LORA=y
CONFIG_LORA_SIM=y

# GNSS over emulated UART
CONFIG_SERIAL=y
CONFIG_UART_NATIVE_POSIX=y
CONFIG_GNSS=y
CONFIG_GNSS_NMEA_GENERIC=y

# Console on native stdin/stdout
CONFIG_CONSOLE=y
CONFIG_NATIVE_UART_0_ON_STDINOUT=y

# NVS on emulated flash
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# GPIO for LED/DIP/PPS stubs
CONFIG_GPIO=y

# Shell
CONFIG_SHELL=y
