CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_SPI=n
CONFIG_SPI_NOR=n
CONFIG_ADC=n

# Enable emulated sensor framework
CONFIG_SENSOR=y
CONFIG_FAKE_SENSOR=y

# Logging goes to native console
CONFIG_CONSOLE=y
CONFIG_NATIVE_UART_0_ON_STDINOUT=y

# NVS on emulated flash
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# GPIO for pyro/LED stubs
CONFIG_GPIO=y

# FAT filesystem can still be exercised against emulated flash
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_MKFS=y
CONFIG_FILE_SYSTEM_MKFS=y
