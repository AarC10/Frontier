CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_SPI=n
CONFIG_SPI_NOR=n
CONFIG_ADC=n

# Enable emulated sensor framework
CONFIG_SENSOR=y

# Logging goes to native console
CONFIG_CONSOLE=y

# NVS on emulated flash
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# GPIO for pyro/LED stubs
CONFIG_GPIO=y

# Added for native_sim Unix domain socket reader
CONFIG_NETWORKING=y
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y
CONFIG_ETH_NATIVE_TAP=n
CONFIG_POSIX_API=y

# Keep simulator build minimal: no FAT/disk plumbing required for compile smoke tests
CONFIG_FILE_SYSTEM=n
CONFIG_FAT_FILESYSTEM_ELM=n
CONFIG_FS_FATFS_MKFS=n
CONFIG_FILE_SYSTEM_MKFS=n
CONFIG_DISK_ACCESS=n
CONFIG_DISK_DRIVERS=n
CONFIG_DISK_DRIVER_FLASH=n

# Silence board-irrelevant warnings inherited from prj.conf
CONFIG_MS56XX=n
CONFIG_SHELL_BACKEND_SERIAL=n
CONFIG_THREAD_ANALYZER=n
