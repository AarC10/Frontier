# Core
CONFIG_CORE=y
CONFIG_CORE_SENSORS=y
CONFIG_CORE_IO=y
CONFIG_CORE_FLIGHT=y
CONFIG_CORE_FLIGHT_LOGGER=y
CONFIG_CORE_SETTINGS=y
CONFIG_CORE_SETTINGS_FLIGHT_COMPUTER=y
CONFIG_CORE_PYRO=y

# C++
CONFIG_CPP=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_STD_CPP23=y

# Logging
CONFIG_CONSOLE=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_PRINTK=y
#CONFIG_UART_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=0
CONFIG_SHELL_LOG_BACKEND=y
CONFIG_LOG_BUFFER_SIZE=4096

# Flash + Storage
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_SETTINGS_NVS_SECTOR_SIZE_MULT=1
CONFIG_SETTINGS_NVS_SECTOR_COUNT=4
# This would cause flash driver to erase 4 sectors which is fine for W25Q
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_DISK_DRIVERS=y
CONFIG_DISK_DRIVER_FLASH=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_FAT_FILESYSTEM_ELM=y
#CONFIG_FS_FATFS_FSTAB_AUTOMOUNT=y
CONFIG_FS_FATFS_MOUNT_MKFS=y
#CONFIG_FS_FATFS_MKFS=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_LOG_DEFAULT_LEVEL=4

CONFIG_LOG=n
CONFIG_SHELL_LOG_BACKEND=n

# Drivers
CONFIG_SENSOR=y
CONFIG_MS56XX=y

CONFIG_SMF=y
CONFIG_UART_INTERRUPT_DRIVEN=y

CONFIG_SERIAL=y
CONFIG_COUNTER=y

CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
CONFIG_ISR_STACK_SIZE=8192
CONFIG_SHELL=y