#
# Core modules
#
CONFIG_CORE=y
CONFIG_CORE_IO=y
CONFIG_CORE_SENSORS=n
CONFIG_CORE_FLIGHT=n
CONFIG_CORE_FLIGHT_LOGGER=n
CONFIG_CORE_SETTINGS=n
CONFIG_CORE_SETTINGS_FLIGHT_COMPUTER=n
CONFIG_CORE_PYRO=n

#
# C++
#
CONFIG_CPP=y
CONFIG_REQUIRES_FULL_LIBCPP=n
CONFIG_STD_CPP23=n

#
# GPIO / Serial / console
#
CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y

#
# Logging
#
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_MODE_DEFERRED=n
CONFIG_LOG_PROCESS_THREAD=n
CONFIG_LOG_MODE_OVERFLOW=n
CONFIG_LOG_BUFFER_SIZE=1024
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_PRINTK=n

#
# Shell
#
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_SHELL_LOG_BACKEND=n
CONFIG_SHELL_CMDS=n
CONFIG_SHELL_HISTORY=n
CONFIG_SHELL_TAB=n
CONFIG_SHELL_WILDCARD=n
CONFIG_SHELL_METAKEYS=n
CONFIG_SHELL_VT100_COMMANDS=n
CONFIG_SHELL_CMDS_SELECT=n
CONFIG_SHELL_GETOPT=n

#
# Settings / Storage
#
CONFIG_SETTINGS=n
CONFIG_FLASH=n
CONFIG_FLASH_MAP=n
CONFIG_FLASH_PAGE_LAYOUT=n
CONFIG_DISK_ACCESS=n
CONFIG_DISK_DRIVERS=n
CONFIG_DISK_DRIVER_FLASH=n
CONFIG_FILE_SYSTEM=n
CONFIG_FILE_SYSTEM_MKFS=n
CONFIG_FAT_FILESYSTEM_ELM=n
CONFIG_FS_FATFS_MOUNT_MKFS=n
CONFIG_NVS=n

#
# Stack / heap
#
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_ISR_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=0

#
# Debugging
#
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y
CONFIG_INIT_STACKS=y
CONFIG_STACK_SENTINEL=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_ANALYZER=n
CONFIG_THREAD_ANALYZER_AUTO=n
CONFIG_DEBUG=y

#
# USB
#
CONFIG_USB_DEVICE_STACK=n
CONFIG_USBD_CDC_ACM_CLASS=n
CONFIG_USBD_MSC_CLASS=n