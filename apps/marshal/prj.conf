#
# Core modules
#
CONFIG_CORE=y
CONFIG_CORE_SENSORS=y
CONFIG_CORE_IO=y
CONFIG_CORE_FLIGHT=y
CONFIG_CORE_FLIGHT_LOGGER=y
CONFIG_CORE_SETTINGS=y
CONFIG_CORE_SETTINGS_FLIGHT_COMPUTER=y
CONFIG_CORE_PYRO=y

#
# C++
#
CONFIG_CPP=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_STD_CPP23=y

#
# Serial / console
#
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y

#
# Logging
#
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=3072
CONFIG_LOG_BUFFER_SIZE=8192
CONFIG_EXTRA_EXCEPTION_INFO=y

#
# Shell
#
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_STACK_SIZE=8192
CONFIG_SHELL_LOG_BACKEND=y
CONFIG_SHELL_CMDS=y
CONFIG_SHELL_HISTORY=y
CONFIG_SHELL_TAB=y
CONFIG_SHELL_WILDCARD=y
CONFIG_SHELL_METAKEYS=y
CONFIG_SHELL_VT100_COMMANDS=y
CONFIG_SHELL_CMDS_SELECT=y
CONFIG_SHELL_GETOPT=y
CONFIG_SHELL_HELP=y
CONFIG_SHELL_STATS=y
CONFIG_DEVICE_SHELL=n
CONFIG_DATE_SHELL=n
CONFIG_DEVMEM_SHELL=n
CONFIG_APP_VERSION_SHELL=n
CONFIG_KERNEL_SHELL=n
CONFIG_THREAD_MONITOR=n
CONFIG_THREAD_STACK_INFO=n
CONFIG_LOG_RUNTIME_FILTERING=n
CONFIG_HWINFO=y
CONFIG_HWINFO_SHELL=y

#
# USB
#
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBC_STACK=y
CONFIG_USBC_CSM_SINK_ONLY=y
CONFIG_USBC_THREAD_PRIORITY=10
CONFIG_USBC_TCPC_SHELL=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_OFF=y
CONFIG_USBD_MSC_CLASS=y
CONFIG_USBD_BOS_SUPPORT=n
CONFIG_USBD_VREQ_SUPPORT=n
CONFIG_USBD_THREAD_STACK_SIZE=2048
CONFIG_USBD_MSC_STACK_SIZE=2048

#
# Flash / storage
#
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096

#
# Disk
#
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVERS=y
CONFIG_DISK_DRIVER_FLASH=y

#
# Filesystem
#
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_MOUNT_MKFS=n

#
# Settings / NVS
#
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_SETTINGS_NVS_SECTOR_SIZE_MULT=1
CONFIG_SETTINGS_NVS_SECTOR_COUNT=4

#
# Drivers
#
CONFIG_ADC=y
CONFIG_ADC_STM32_DMA=y
CONFIG_SENSOR=y
CONFIG_MS56XX=y
CONFIG_COUNTER=y

#
# Stack / heap
#
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_ISR_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=6144
CONFIG_HEAP_MEM_POOL_SIZE=8192

#
# Debugging
#
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=n
CONFIG_INIT_STACKS=n
CONFIG_STACK_SENTINEL=n
CONFIG_THREAD_NAME=y
CONFIG_THREAD_ANALYZER=n
CONFIG_THREAD_ANALYZER_AUTO=n
